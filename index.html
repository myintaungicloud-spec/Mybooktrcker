<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LUMINA - Cloud Sync Fixed</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Manrope:wght@200;300;400;500;600;700;800&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: { "surface-dim": "#0e0e12", "primary": "#8ff5ff", "secondary": "#ac89ff", "tertiary": "#ff59e3", "surface-container": "#19191e", "on-surface": "#f3eff6", "on-surface-variant": "#acaab0", "error-dim": "#d7383b" },
              fontFamily: { "headline": ["Space Grotesk"], "body": ["Manrope"], "label": ["Inter"] },
            },
          },
        }
    </script>
    
    <style>
        body { background-color: #0e0e12; background-image: radial-gradient(at 0% 0%, rgba(143, 245, 255, 0.15) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(255, 89, 227, 0.1) 0px, transparent 50%), radial-gradient(at 50% 100%, rgba(172, 137, 255, 0.1) 0px, transparent 50%); min-height: 100dvh; overflow-x: hidden; }
        .glass-card { backdrop-filter: blur(24px); background: rgba(37, 37, 43, 0.4); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05) inset; }
        .liquid-gradient { background: linear-gradient(135deg, #8ff5ff 0%, #ac89ff 100%); }
        .view-content { display: none; }
        .view-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: #8ff5ff; }
    </style>
</head>

<body class="font-body text-on-surface selection:bg-primary/30">

<!-- Header -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e12]/60 backdrop-blur-lg border-b border-white/5 flex justify-between items-center px-6 h-16">
    <div class="flex items-center gap-3"><span class="material-symbols-outlined text-[#8ff5ff]">menu</span></div>
    <div class="flex flex-col items-center">
        <h1 class="font-['Space_Grotesk'] text-2xl font-black text-[#8ff5ff] tracking-tighter">LUMINA</h1>
        <div class="w-4 h-1 bg-primary rounded-full mt-0.5 opacity-50 shadow-[0_0_8px_#8ff5ff]"></div>
    </div>
    <div class="flex items-center gap-4">
        <div class="w-8 h-8 rounded-full border border-primary/20 p-0.5 cursor-pointer" onclick="switchView('profile')">
            <img id="nav-avatar" class="w-full h-full rounded-full object-cover" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Guest"/>
        </div>
    </div>
</header>

<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
    <!-- VIEW: LIBRARY -->
    <div class="view-content active space-y-10" id="view-library">
        <section class="space-y-1">
            <p class="font-label text-xs uppercase tracking-[0.2em] text-primary font-bold">Good Evening</p>
            <h2 class="font-headline text-4xl font-bold tracking-tight">Bookshelf Home</h2>
        </section>

        <section class="relative group">
            <div class="relative glass-card rounded-[1.5rem] p-8 overflow-hidden">
                <div class="absolute top-0 right-0 -mr-16 -mt-16 w-48 h-48 liquid-gradient rounded-full blur-[60px] opacity-30"></div>
                <div class="flex flex-col h-full justify-between relative z-10">
                    <div><h3 class="font-headline text-3xl font-extrabold leading-tight">Cloud Storage<br/>Sync Status</h3></div>
                    <div class="mt-8 flex items-end justify-between">
                        <div class="flex flex-col">
                            <span id="book-count-display" class="text-4xl font-headline font-black text-primary">0</span>
                            <span class="font-label text-[10px] uppercase tracking-wider text-on-surface-variant">Books Devoured</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="space-y-6">
            <div class="flex justify-between items-center">
                <h4 class="font-headline text-xl font-bold">Reading Now</h4>
            </div>
            <div id="library-container" class="space-y-4">
                <p class="text-on-surface-variant text-center py-10 italic">Please login to sync your library...</p>
            </div>
        </section>
    </div>

    <!-- VIEW: DISCOVER -->
    <div class="view-content space-y-10" id="view-discover">
        <h2 class="font-headline text-4xl font-bold tracking-tight">Discover</h2>
        <div onclick="addSampleBook()" class="glass-card rounded-2xl p-8 text-center border-dashed border-2 border-primary/30 cursor-pointer hover:bg-primary/5 transition-all">
            <span class="font-headline font-bold text-xl text-primary">+ Add New Book To Cloud</span>
        </div>
    </div>

    <!-- VIEW: PROFILE -->
    <div class="view-content space-y-10" id="view-profile">
        <section class="flex flex-col items-center text-center space-y-4">
            <div class="w-32 h-32 rounded-full p-1 bg-gradient-to-br from-primary via-secondary to-tertiary">
                <div class="w-full h-full rounded-full border-4 border-surface overflow-hidden">
                    <img id="main-avatar" class="w-full h-full object-cover" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Guest"/>
                </div>
            </div>
            <div>
                <h2 id="profile-name" class="font-headline text-2xl font-bold">Guest User</h2>
                <p id="profile-status" class="text-primary font-bold text-xs uppercase tracking-widest mt-1">Not Connected</p>
            </div>
        </section>

        <section class="glass-card rounded-3xl overflow-hidden border border-white/5">
            <div class="p-2">
                <button onclick="toggleAccountSettings()" class="w-full flex items-center justify-between p-4 hover:bg-white/5 rounded-2xl">
                    <div class="flex items-center gap-4"><span class="material-symbols-outlined">account_circle</span><span class="font-medium">Account Settings</span></div>
                    <span id="chevron" class="material-symbols-outlined text-sm transition-transform">chevron_right</span>
                </button>
                <div id="account-settings-content" class="hidden p-4 border-t border-white/5 flex flex-col items-center gap-4">
                    <button id="login-btn" onclick="signIn()" class="bg-white text-black px-8 py-3 rounded-full font-bold flex items-center gap-2 shadow-xl hover:scale-105 transition-all">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5"/> Sign in with Google
                    </button>
                    <div id="user-info" class="hidden text-center">
                        <p id="user-email" class="text-xs text-primary font-medium mb-3"></p>
                        <button onclick="signOut()" class="text-[10px] text-error-dim font-black uppercase tracking-widest border border-error-dim/20 px-4 py-2 rounded-full">Disconnect Account</button>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>

<!-- Nav Bar -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-lg rounded-full bg-[#25252b]/40 backdrop-blur-2xl border border-white/10 h-20 flex justify-around items-center px-2 z-50">
    <div class="absolute h-12 bg-primary/10 border border-primary/20 rounded-full transition-all duration-500" id="nav-indicator" style="width: 33.33%; left: 0%;"></div>
    <a class="nav-item active relative z-10 flex flex-col items-center justify-center w-1/3 h-full" onclick="switchView('library', this)"><span class="material-symbols-outlined">auto_stories</span><span class="text-[10px] font-bold uppercase mt-1">Library</span></a>
    <a class="nav-item relative z-10 flex flex-col items-center justify-center text-zinc-500 w-1/3 h-full" onclick="switchView('discover', this)"><span class="material-symbols-outlined">explore</span><span class="text-[10px] font-bold uppercase mt-1">Discover</span></a>
    <a class="nav-item relative z-10 flex flex-col items-center justify-center text-zinc-500 w-1/3 h-full" onclick="switchView('profile', this)"><span class="material-symbols-outlined">person</span><span class="text-[10px] font-bold uppercase mt-1">Profile</span></a>
</nav>

<script>
    // --- (၁) Firebase Config ---
    const firebaseConfig = {
        apiKey: "AIzaSyCqiILWM9uqNi_AFuZ2Hr3tkBMzNFzAsUg",
        authDomain: "booknote-200391.firebaseapp.com",
        projectId: "booknote-200391",
        storageBucket: "booknote-200391.firebasestorage.app",
        messagingSenderId: "1068286597810",
        appId: "1:1068286597810:web:0a05cb76646053378987ab"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- (၂) Login Logic (Handling Redirect Result) ---
    function signIn() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithRedirect(provider);
    }

    function signOut() {
        auth.signOut().then(() => location.reload());
    }

    // Redirect ကနေ ပြန်လာတဲ့ User data ကို ဖမ်းယူမယ်
    auth.getRedirectResult().then(result => {
        if (result.user) {
            updateUI(result.user);
        }
    }).catch(error => console.error("Login Error:", error));

    // Session ရှိမရှိ စစ်ဆေးမယ်
    auth.onAuthStateChanged(user => {
        if (user) {
            updateUI(user);
            fetchBooks(user.uid);
        }
    });

    function updateUI(user) {
        document.getElementById("profile-name").innerText = user.displayName;
        document.getElementById("profile-status").innerText = "ELITE COLLECTOR • SYNC ACTIVE";
        document.getElementById("main-avatar").src = user.photoURL;
        document.getElementById("nav-avatar").src = user.photoURL;
        document.getElementById("user-email").innerText = user.email;
        
        document.getElementById("login-btn").classList.add("hidden");
        document.getElementById("user-info").classList.remove("hidden");
    }

    // --- (၃) Firestore Sync ---
    function fetchBooks(uid) {
        db.collection("users").doc(uid).collection("myBooks").onSnapshot(snap => {
            const container = document.getElementById('library-container');
            const countDisplay = document.getElementById('book-count-display');
            const books = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            
            countDisplay.innerText = books.length;

            if (books.length === 0) {
                container.innerHTML = `<p class="text-on-surface-variant text-center py-10 italic">Your cloud library is empty.</p>`;
                return;
            }

            container.innerHTML = books.map(book => `
                <div class="glass-card rounded-xl p-4 flex gap-6 items-center border border-white/5">
                    <img class="w-20 h-28 flex-shrink-0 rounded-lg object-cover shadow-2xl" src="${book.cover}"/>
                    <div class="flex-1 space-y-3">
                        <div>
                            <h5 class="font-headline text-lg font-bold">${book.title}</h5>
                            <p class="text-sm text-on-surface-variant">by ${book.author}</p>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between items-center text-[10px] font-bold text-primary uppercase">
                                <span>${book.progress}% Complete</span>
                                <button onclick="updateProgress('${book.id}', ${book.progress})" class="underline">+10%</button>
                            </div>
                            <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                                <div class="h-full liquid-gradient" style="width: ${book.progress}%"></div>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        });
    }

    function addSampleBook() {
        const user = auth.currentUser;
        if (!user) return alert("Please Login First!");
        db.collection("users").doc(user.uid).collection("myBooks").add({
            title: "Project Hail Mary",
            author: "Andy Weir",
            progress: 20,
            cover: "https://covers.openlibrary.org/b/id/10543205-L.jpg"
        });
        alert("Sample book added to your cloud library!");
    }

    function updateProgress(id, current) {
        const next = current >= 100 ? 0 : current + 10;
        db.collection("users").doc(auth.currentUser.uid).collection("myBooks").doc(id).update({ progress: next });
    }

    // --- (၄) Navigation Logic ---
    function switchView(id, el) {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        const navItems = document.querySelectorAll('.nav-item');
        const indicator = document.getElementById('nav-indicator');
        navItems.forEach(n => { n.classList.remove('active', 'text-primary'); n.classList.add('text-zinc-500'); });
        el.classList.add('active', 'text-primary');
        indicator.style.left = (el.getBoundingClientRect().left - el.parentElement.getBoundingClientRect().left) + 'px';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleAccountSettings() {
        const content = document.getElementById('account-settings-content');
        const chevron = document.getElementById('chevron');
        content.classList.toggle('hidden');
        chevron.style.transform = content.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(90deg)';
    }
</script>

</body>
</html>
